name: yetimatch
description: YetiMatch - personality quiz app (Flutter).
publish_to: 'none'
version: 1.1.5+5

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # Firebase
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.1.3
  # RevenueCat
  purchases_flutter: ^9.14.0
  purchases_ui_flutter: ^9.14.0
  # Local storage & networking
  shared_preferences: ^2.3.3
  http: ^1.2.2
  # URL launcher for privacy/support links
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.4

dependency_overrides:
  meta: ^1.18.1

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/yetimatch.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/images/yetimatch.png
  min_sdk_android: 21
