# YetiMatch – Flutter (Android + iOS)
workflows:
  android-flutter:
    name: Android (Flutter)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      groups:
        - variables
      vars:
        PACKAGE_NAME: "com.daddoodev.yetimatch"
      android_signing:
        - codemagic_android_keystore
    scripts:
      - name: Set up Firebase (Android)
        script: |
          echo $GOOGLE_SERVICES_JSON | base64 --decode > android/app/google-services.json
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Build Android (debug APK)
        script: |
          flutter build apk --debug
      - name: Build Android (release)
        script: |
          flutter build apk --release
          flutter build appbundle --release
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/bundle/release/*.aab
    publishing:
      google_play:
        credentials: $GOOGLE_PLAY_SERVICE_ACCOUNT_CREDENTIALS
        track: internal

  ios-flutter:
    name: iOS (Flutter)
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: apidistributekey
    environment:
      groups:
        - variables
      vars:
        BUNDLE_ID: "com.daddoodev.yetimatch"
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.daddoodev.yetimatch
      xcode: latest
      cocoapods: default
    scripts:
      - name: Set up Firebase (iOS)
        script: |
          echo $GoogleServiceInfo | base64 --decode > ios/Runner/GoogleService-Info.plist
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Install CocoaPods
        script: |
          cd ios && pod install
      - name: Build IPA
        script: |
          flutter build ipa --release
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false

  both-platforms:
    name: Android + iOS (Flutter)
    max_build_duration: 90
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: apidistributekey
    environment:
      groups:
        - variables
      vars:
        PACKAGE_NAME: "com.daddoodev.yetimatch"
        BUNDLE_ID: "com.daddoodev.yetimatch"
      android_signing:
        - codemagic_android_keystore
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.daddoodev.yetimatch
      xcode: latest
      cocoapods: default
    scripts:
      - name: Set up Firebase (Android)
        script: |
          echo $GOOGLE_SERVICES_JSON | base64 --decode > android/app/google-services.json
      - name: Set up Firebase (iOS)
        script: |
          echo $GoogleServiceInfo | base64 --decode > ios/Runner/GoogleService-Info.plist
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Build Android
        script: |
          flutter build apk --release
          flutter build appbundle --release
      - name: Install CocoaPods
        script: |
          cd ios && pod install
      - name: Build IPA
        script: |
          flutter build ipa --release
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/bundle/release/*.aab
      - build/ios/ipa/*.ipa
    publishing:
      google_play:
        credentials: $GOOGLE_PLAY_SERVICE_ACCOUNT_CREDENTIALS
        track: internal
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
