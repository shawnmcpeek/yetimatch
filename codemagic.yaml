# YetiMatch – Flutter (Android + iOS)
# Quiz API key is compiled into the app (AppConfig); no dart-define for YETIMATCH_API_KEY.
# Store uploads run in scripts (codemagic-cli-tools) so they are not skipped when YAML
# "publishing:" would show "Not publishing to external services" (e.g. PR builds).
# Google Play: GOOGLE_PLAY_SERVICE_ACCOUNT_CREDENTIALS + optional GOOGLE_PLAY_TRACK (default alpha).
# iOS: App Store Connect integration + app-store-connect publish (same as prior submit_to_testflight).
workflows:
  android-flutter:
    name: Android (Flutter)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      groups:
        - variables
      vars:
        PACKAGE_NAME: "com.daddoodev.yetimatch"
      android_signing:
        - codemagic_android_keystore
    scripts:
      - name: Set up Firebase (Android)
        script: |
          echo $GOOGLE_SERVICES_JSON | base64 --decode > android/app/google-services.json
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Build Android (debug APK)
        script: |
          flutter build apk --debug
      - name: Build Android (release)
        script: |
          flutter build apk --release
          flutter build appbundle --release
      - name: Publish AAB to Google Play
        script: |
          set -e
          python3 -m pip install -q codemagic-cli-tools
          TRACK="${GOOGLE_PLAY_TRACK:-alpha}"
          google-play bundles publish \
            --bundle "$CM_BUILD_DIR/build/app/outputs/bundle/release/app-release.aab" \
            --track "$TRACK"
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/bundle/release/*.aab
      - build/app/outputs/mapping/release/mapping.txt
      - build/app/outputs/native-debug-symbols/release/*.zip

  ios-flutter:
    name: iOS (Flutter)
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: apidistributekey
    environment:
      flutter: stable
      groups:
        - variables
      vars:
        BUNDLE_ID: "com.daddoodev.yetimatch"
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.daddoodev.yetimatch
      xcode: latest
      cocoapods: default
    scripts:
      - name: Set up Firebase (iOS)
        script: |
          echo $GoogleServiceInfo | base64 --decode > ios/Runner/GoogleService-Info.plist
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Install CocoaPods
        script: |
          cd ios && pod install
      - name: Build IPA
        script: |
          flutter build ipa --release --export-method=app-store
      - name: Publish IPA to App Store Connect (TestFlight)
        script: |
          set -e
          python3 -m pip install -q codemagic-cli-tools
          app-store-connect publish \
            --path "$CM_BUILD_DIR/build/ios/ipa/*.ipa" \
            --testflight
    artifacts:
      - build/ios/ipa/*.ipa

  both-platforms:
    name: Android + iOS (Flutter)
    max_build_duration: 90
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: apidistributekey
    environment:
      flutter: stable
      groups:
        - variables
      vars:
        PACKAGE_NAME: "com.daddoodev.yetimatch"
        BUNDLE_ID: "com.daddoodev.yetimatch"
      android_signing:
        - codemagic_android_keystore
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.daddoodev.yetimatch
      xcode: latest
      cocoapods: default
    scripts:
      - name: Set up Firebase (Android)
        script: |
          echo $GOOGLE_SERVICES_JSON | base64 --decode > android/app/google-services.json
      - name: Set up Firebase (iOS)
        script: |
          echo $GoogleServiceInfo | base64 --decode > ios/Runner/GoogleService-Info.plist
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Build Android
        script: |
          flutter build apk --release
          flutter build appbundle --release
      - name: Publish AAB to Google Play
        script: |
          set -e
          python3 -m pip install -q codemagic-cli-tools
          TRACK="${GOOGLE_PLAY_TRACK:-alpha}"
          google-play bundles publish \
            --bundle "$CM_BUILD_DIR/build/app/outputs/bundle/release/app-release.aab" \
            --track "$TRACK"
      - name: Install CocoaPods
        script: |
          cd ios && pod install
      - name: Build IPA
        script: |
          flutter build ipa --release --export-method=app-store
      - name: Publish IPA to App Store Connect (TestFlight)
        script: |
          set -e
          python3 -m pip install -q codemagic-cli-tools
          app-store-connect publish \
            --path "$CM_BUILD_DIR/build/ios/ipa/*.ipa" \
            --testflight
    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/bundle/release/*.aab
      - build/app/outputs/mapping/release/mapping.txt
      - build/app/outputs/native-debug-symbols/release/*.zip
      - build/ios/ipa/*.ipa
